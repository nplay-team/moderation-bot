services:
  postgres:
    image: postgres:16.4
    container_name: nplay-moderation-database
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - nplay-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  nplay-data: